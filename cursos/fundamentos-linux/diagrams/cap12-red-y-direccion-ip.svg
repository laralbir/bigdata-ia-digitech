<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Diagrama de red simple y anatomía de una dirección IPv4</title>
  <defs>
    <marker id="arrow12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>
  <rect width="800" height="340" fill="#ffffff"/>
  <text x="400" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">De la LAN a Internet, y anatomía de una dirección IPv4</text>

  <!-- Panel A: network -->
  <rect x="20" y="60" width="150" height="60" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="95" y="85" text-anchor="middle" font-size="12.5" fill="#1a4d8b">💻 PC Cliente</text>
  <text x="95" y="102" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">192.168.1.10</text>

  <line x1="170" y1="90" x2="210" y2="90" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow12)"/>
  <line x1="210" y1="90" x2="170" y2="90" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow12)"/>

  <rect x="210" y="60" width="160" height="60" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="290" y="85" text-anchor="middle" font-size="12.5" fill="#1a4d8b">🌐 Router / Gateway</text>
  <text x="290" y="102" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">192.168.1.1</text>

  <line x1="370" y1="90" x2="410" y2="90" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow12)"/>
  <line x1="410" y1="90" x2="370" y2="90" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow12)"/>

  <rect x="410" y="60" width="140" height="60" rx="30" fill="#f5f5f5" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="480" y="95" text-anchor="middle" font-size="13" fill="#555555">☁️ Internet</text>

  <line x1="550" y1="90" x2="595" y2="90" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow12)"/>
  <line x1="595" y1="90" x2="550" y2="90" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow12)"/>

  <rect x="595" y="60" width="170" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="680" y="85" text-anchor="middle" font-size="12.5" fill="#215a26">🖥️ Servidor Web</text>
  <text x="680" y="102" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#215a26">203.0.113.5 (IP pública)</text>

  <line x1="20" y1="150" x2="780" y2="150" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Panel B: IPv4 anatomy -->
  <text x="400" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#333333">Anatomía de una dirección IPv4 con máscara /24</text>

  <rect x="60" y="195" width="100" height="50" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="110" y="226" text-anchor="middle" font-size="16" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">192</text>

  <rect x="170" y="195" width="100" height="50" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="220" y="226" text-anchor="middle" font-size="16" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">168</text>

  <rect x="280" y="195" width="100" height="50" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="330" y="226" text-anchor="middle" font-size="16" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">1</text>

  <rect x="390" y="195" width="100" height="50" fill="#fbeaea" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="440" y="226" text-anchor="middle" font-size="16" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#8b1a1a">10</text>

  <rect x="510" y="195" width="70" height="50" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="545" y="226" text-anchor="middle" font-size="16" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#555555">/24</text>

  <!-- brackets -->
  <line x1="60" y1="260" x2="380" y2="260" stroke="#1a4d8b" stroke-width="1.5"/>
  <line x1="60" y1="260" x2="60" y2="266" stroke="#1a4d8b" stroke-width="1.5"/>
  <line x1="380" y1="260" x2="380" y2="266" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="220" y="282" text-anchor="middle" font-size="11.5" fill="#1a4d8b">Parte de RED (definida por /24 = primeros 24 bits)</text>

  <line x1="390" y1="260" x2="490" y2="260" stroke="#8b1a1a" stroke-width="1.5"/>
  <line x1="390" y1="260" x2="390" y2="266" stroke="#8b1a1a" stroke-width="1.5"/>
  <line x1="490" y1="260" x2="490" y2="266" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle" font-size="11.5" fill="#8b1a1a">Parte de HOST</text>

  <text x="400" y="315" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">Con /24, los primeros 3 octetos identifican la red y el último identifica al host dentro de ella.</text>
</svg>
