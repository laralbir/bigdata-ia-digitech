<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Jerarquía de buses de hardware y comparación MBR vs GPT</title>
  <defs>
    <marker id="arrow10" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>
  <rect width="780" height="460" fill="#ffffff"/>
  <text x="390" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Jerarquía de buses de hardware</text>

  <!-- CPU -->
  <rect x="320" y="30" width="140" height="40" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="390" y="55" text-anchor="middle" font-size="13" fill="#ffffff">CPU</text>
  <line x1="390" y1="70" x2="390" y2="95" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow10)"/>

  <!-- Chipset -->
  <rect x="260" y="95" width="260" height="40" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="390" y="120" text-anchor="middle" font-size="12.5" fill="#1a4d8b">Chipset / bus del sistema</text>

  <line x1="390" y1="135" x2="150" y2="170" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow10)"/>
  <line x1="390" y1="135" x2="390" y2="170" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow10)"/>
  <line x1="390" y1="135" x2="630" y2="170" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow10)"/>

  <rect x="30" y="170" width="220" height="55" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="140" y="192" text-anchor="middle" font-size="12.5" fill="#333333">Bus PCIe</text>
  <text x="140" y="209" text-anchor="middle" font-size="10.5" fill="#666666">tarjetas gráficas, red</text>

  <rect x="280" y="170" width="220" height="55" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="390" y="192" text-anchor="middle" font-size="12.5" fill="#333333">Bus SATA</text>
  <text x="390" y="209" text-anchor="middle" font-size="10.5" fill="#666666">discos duros, unidades SSD</text>

  <rect x="520" y="170" width="220" height="55" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="630" y="192" text-anchor="middle" font-size="12.5" fill="#333333">Bus USB</text>
  <text x="630" y="209" text-anchor="middle" font-size="10.5" fill="#666666">teclado, ratón, discos externos</text>

  <line x1="20" y1="248" x2="760" y2="248" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="390" y="272" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">MBR frente a GPT (tablas de particiones)</text>

  <!-- MBR disk -->
  <rect x="60" y="295" width="300" height="70" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <line x1="135" y1="295" x2="135" y2="365" stroke="#1a4d8b" stroke-width="1"/>
  <line x1="210" y1="295" x2="210" y2="365" stroke="#1a4d8b" stroke-width="1"/>
  <line x1="285" y1="295" x2="285" y2="365" stroke="#1a4d8b" stroke-width="1"/>
  <text x="97" y="334" text-anchor="middle" font-size="12" fill="#1a4d8b">P1</text>
  <text x="172" y="334" text-anchor="middle" font-size="12" fill="#1a4d8b">P2</text>
  <text x="247" y="334" text-anchor="middle" font-size="12" fill="#1a4d8b">P3</text>
  <text x="322" y="334" text-anchor="middle" font-size="12" fill="#1a4d8b">P4</text>
  <text x="210" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d8b">MBR</text>
  <text x="210" y="402" text-anchor="middle" font-size="10.5" fill="#666666">máx. 4 particiones primarias</text>
  <text x="210" y="416" text-anchor="middle" font-size="10.5" fill="#666666">discos hasta 2 TB</text>

  <!-- GPT disk -->
  <rect x="420" y="295" width="300" height="70" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="470" y1="295" x2="470" y2="365" stroke="#2e7d32" stroke-width="1"/>
  <line x1="520" y1="295" x2="520" y2="365" stroke="#2e7d32" stroke-width="1"/>
  <line x1="570" y1="295" x2="570" y2="365" stroke="#2e7d32" stroke-width="1"/>
  <line x1="620" y1="295" x2="620" y2="365" stroke="#2e7d32" stroke-width="1"/>
  <line x1="670" y1="295" x2="670" y2="365" stroke="#2e7d32" stroke-width="1"/>
  <text x="445" y="334" text-anchor="middle" font-size="11" fill="#215a26">P1</text>
  <text x="495" y="334" text-anchor="middle" font-size="11" fill="#215a26">P2</text>
  <text x="545" y="334" text-anchor="middle" font-size="11" fill="#215a26">P3</text>
  <text x="595" y="334" text-anchor="middle" font-size="11" fill="#215a26">P4</text>
  <text x="645" y="334" text-anchor="middle" font-size="11" fill="#215a26">P5</text>
  <text x="695" y="334" text-anchor="middle" font-size="11" fill="#215a26">…</text>
  <text x="570" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#215a26">GPT</text>
  <text x="570" y="402" text-anchor="middle" font-size="10.5" fill="#666666">hasta 128 particiones</text>
  <text x="570" y="416" text-anchor="middle" font-size="10.5" fill="#666666">discos &gt; 2 TB · tabla redundante</text>

  <text x="390" y="445" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">GPT sustituye a MBR en discos modernos, con más particiones y protección contra corrupción de la tabla.</text>
</svg>
