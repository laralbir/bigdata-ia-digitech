<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Encadenamiento de tuberías (pipes) y redirección de entrada/salida</title>
  <defs>
    <marker id="arrow8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Tuberías (pipes) y redirección de entrada/salida</text>

  <text x="20" y="42" font-size="12" font-weight="bold" fill="#1a4d8b">1. Encadenamiento de comandos con tuberías</text>

  <rect x="20" y="60" width="150" height="50" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="95" y="90" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">cat archivo.txt</text>

  <text x="192" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#b36b00">|</text>
  <line x1="170" y1="85" x2="215" y2="85" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow8)"/>

  <rect x="215" y="60" width="150" height="50" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="290" y="90" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">grep "texto"</text>

  <text x="402" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#b36b00">|</text>
  <line x1="365" y1="85" x2="440" y2="85" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow8)"/>

  <rect x="440" y="60" width="110" height="50" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="495" y="90" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">sort</text>

  <line x1="550" y1="85" x2="620" y2="85" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow8)"/>

  <rect x="620" y="60" width="150" height="50" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="695" y="90" text-anchor="middle" font-size="12.5" fill="#444444">🖥️ pantalla</text>

  <text x="400" y="135" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#666666">cat archivo.txt | grep "texto" | sort</text>

  <line x1="20" y1="155" x2="780" y2="155" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="20" y="180" font-size="12" font-weight="bold" fill="#1a4d8b">2. Redirección de entrada/salida (I/O redirection)</text>

  <rect x="55" y="225" width="190" height="60" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="150" y="250" text-anchor="middle" font-size="12" fill="#444444">📄 archivo.txt</text>
  <text x="150" y="267" text-anchor="middle" font-size="10.5" fill="#888888">STDIN (0)</text>

  <line x1="245" y1="255" x2="305" y2="255" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow8)"/>
  <text x="275" y="248" text-anchor="middle" font-size="13" font-weight="bold" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">&lt;</text>

  <rect x="305" y="225" width="160" height="60" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="385" y="260" text-anchor="middle" font-size="13" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace">comando</text>

  <line x1="465" y1="240" x2="555" y2="205" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow8)"/>
  <text x="500" y="210" text-anchor="middle" font-size="13" font-weight="bold" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#2e7d32">&gt;</text>

  <rect x="555" y="175" width="200" height="55" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="655" y="198" text-anchor="middle" font-size="12" fill="#215a26">📄 salida.txt</text>
  <text x="655" y="215" text-anchor="middle" font-size="10.5" fill="#3a7a3f">STDOUT (1)</text>

  <line x1="465" y1="270" x2="555" y2="305" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow8)"/>
  <text x="505" y="305" text-anchor="middle" font-size="13" font-weight="bold" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#8b1a1a">2&gt;</text>

  <rect x="555" y="280" width="200" height="55" rx="8" fill="#fbeaea" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="655" y="303" text-anchor="middle" font-size="12" fill="#8b1a1a">📄 errores.txt</text>
  <text x="655" y="320" text-anchor="middle" font-size="10.5" fill="#a34848">STDERR (2)</text>

  <text x="400" y="370" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#666666">comando &lt; archivo.txt &gt; salida.txt 2&gt; errores.txt</text>
  <text x="400" y="390" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">/dev/null puede usarse en cualquiera de los tres para descartar esa secuencia.</text>
</svg>
