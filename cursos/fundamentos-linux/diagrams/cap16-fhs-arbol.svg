<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Árbol simplificado del Estándar de Jerarquía del Sistema de Archivos (FHS)</title>
  <defs>
    <marker id="arrow16a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>
  <rect width="780" height="340" fill="#ffffff"/>
  <text x="390" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Estándar de Jerarquía del Sistema de Archivos (FHS)</text>

  <!-- root -->
  <rect x="355" y="25" width="70" height="36" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="390" y="48" text-anchor="middle" font-size="14" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace">/</text>

  <text x="390" y="78" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">Directorios esenciales de primer nivel</text>

  <!-- fan lines root -> 8 leaves -->
  <line x1="390" y1="61" x2="75" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="165" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="255" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="345" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="435" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="525" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="615" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="390" y1="61" x2="705" y2="85" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>

  <!-- leaf chips -->
  <g font-size="12" fill="#444444" font-family="SFMono-Regular, Menlo, Consolas, monospace">
    <rect x="35" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="75" y="107" text-anchor="middle">/bin</text>
    <rect x="125" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="165" y="107" text-anchor="middle">/boot</text>
    <rect x="215" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="255" y="107" text-anchor="middle">/dev</text>
    <rect x="305" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="345" y="107" text-anchor="middle">/etc</text>
    <rect x="395" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="435" y="107" text-anchor="middle">/home</text>
    <rect x="485" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="525" y="107" text-anchor="middle">/lib</text>
    <rect x="575" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="615" y="107" text-anchor="middle">/sbin</text>
    <rect x="665" y="85" width="80" height="34" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
    <text x="705" y="107" text-anchor="middle">/tmp</text>
  </g>
  <text x="390" y="135" text-anchor="middle" font-size="10" font-style="italic" fill="#999999">(también /dev, /media, /mnt, /opt, /proc, /root, /srv, /sys — omitidos aquí por espacio)</text>

  <line x1="20" y1="150" x2="760" y2="150" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="390" y="172" text-anchor="middle" font-size="11.5" font-style="italic" fill="#666666">Dos jerarquías con subdirectorios propios (segunda y tercera jerarquía FHS)</text>

  <!-- usr subtree -->
  <rect x="175" y="180" width="90" height="36" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="220" y="203" text-anchor="middle" font-size="13" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace">/usr</text>

  <line x1="220" y1="216" x2="77" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="220" y1="216" x2="172" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="220" y1="216" x2="267" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="220" y1="216" x2="362" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>

  <rect x="35" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="77" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">bin</text>
  <rect x="130" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="172" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">lib</text>
  <rect x="225" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="267" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">local</text>
  <rect x="320" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="362" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">share</text>

  <!-- var subtree -->
  <rect x="515" y="180" width="90" height="36" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="560" y="203" text-anchor="middle" font-size="13" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace">/var</text>

  <line x1="560" y1="216" x2="465" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="560" y1="216" x2="560" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>
  <line x1="560" y1="216" x2="655" y2="248" stroke="#5a6a7a" stroke-width="1.2" marker-end="url(#arrow16a)"/>

  <rect x="423" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="465" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">log</text>
  <rect x="518" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="560" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">spool</text>
  <rect x="613" y="248" width="85" height="32" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="655" y="269" text-anchor="middle" font-size="11.5" fill="#1a4d8b" font-family="SFMono-Regular, Menlo, Consolas, monospace">tmp</text>

  <text x="390" y="320" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">/usr/bin y /usr/local/bin no son esenciales para el arranque; /bin y /sbin sí lo son.</text>
</svg>
