<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Ejemplo de árbol de directorios dentro de un directorio home</title>
  <defs>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>
  <rect width="760" height="260" fill="#ffffff"/>
  <text x="380" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Ejemplo de árbol de directorios en /home/bob</text>

  <!-- connecting lines -->
  <line x1="380" y1="80" x2="140" y2="100" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="380" y1="80" x2="310" y2="100" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="380" y1="80" x2="470" y2="100" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="380" y1="80" x2="630" y2="100" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="140" y1="140" x2="85" y2="178" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="140" y1="140" x2="255" y2="178" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="310" y1="140" x2="425" y2="178" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- root -->
  <rect x="290" y="40" width="180" height="40" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="380" y="65" text-anchor="middle" font-size="13" fill="#ffffff">📁 /home/bob</text>

  <!-- L2 -->
  <rect x="75" y="100" width="130" height="40" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="140" y="125" text-anchor="middle" font-size="12.5" fill="#1a4d8b">📁 Documents</text>

  <rect x="245" y="100" width="130" height="40" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="310" y="125" text-anchor="middle" font-size="12.5" fill="#1a4d8b">📁 Downloads</text>

  <rect x="410" y="100" width="120" height="40" rx="8" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="470" y="125" text-anchor="middle" font-size="12.5" fill="#1a4d8b">📁 Pictures</text>

  <rect x="575" y="100" width="110" height="40" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="630" y="125" text-anchor="middle" font-size="12.5" fill="#444444">📄 .bashrc</text>

  <!-- L3 -->
  <rect x="20" y="178" width="130" height="40" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="85" y="203" text-anchor="middle" font-size="12" fill="#444444">📄 informe.txt</text>

  <rect x="160" y="178" width="190" height="40" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="255" y="203" text-anchor="middle" font-size="12" fill="#444444">📄 presentacion.odp</text>

  <rect x="360" y="178" width="130" height="40" rx="8" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="425" y="203" text-anchor="middle" font-size="12" fill="#444444">📄 imagen.png</text>

  <text x="380" y="245" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">Ruta absoluta: /home/bob/Documents/informe.txt · Ruta relativa desde /home/bob: Documents/informe.txt</text>
</svg>
