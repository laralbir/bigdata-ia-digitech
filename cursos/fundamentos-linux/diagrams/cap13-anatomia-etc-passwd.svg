<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 210" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Anatomía de una línea del archivo /etc/passwd</title>
  <rect width="800" height="210" fill="#ffffff"/>
  <text x="400" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Anatomía de una línea de /etc/passwd</text>

  <!-- field boxes -->
  <rect x="15" y="45" width="96" height="44" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="63" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">sysadmin</text>

  <text x="118" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#999999">:</text>

  <rect x="125" y="45" width="50" height="44" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="150" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#555555">x</text>

  <text x="182" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#999999">:</text>

  <rect x="189" y="45" width="60" height="44" rx="6" fill="#fff3e0" stroke="#b36b00" stroke-width="1.5"/>
  <text x="219" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">1000</text>

  <text x="256" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#999999">:</text>

  <rect x="263" y="45" width="60" height="44" rx="6" fill="#fff3e0" stroke="#b36b00" stroke-width="1.5"/>
  <text x="293" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">1000</text>

  <text x="330" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#999999">:</text>

  <rect x="337" y="45" width="141" height="44" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="407" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#555555">Sysadmin User</text>

  <text x="485" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#999999">:</text>

  <rect x="492" y="45" width="150" height="44" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="567" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#215a26">/home/sysadmin</text>

  <text x="649" y="72" text-anchor="middle" font-size="16" font-weight="bold" fill="#999999">:</text>

  <rect x="656" y="45" width="105" height="44" rx="6" fill="#fbeaea" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="708" y="72" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#8b1a1a">/bin/bash</text>

  <!-- ticks + labels -->
  <line x1="63" y1="89" x2="63" y2="100" stroke="#1a4d8b" stroke-width="1"/>
  <text x="63" y="115" text-anchor="middle" font-size="10.5" fill="#1a4d8b">usuario</text>

  <line x1="150" y1="89" x2="150" y2="100" stroke="#888888" stroke-width="1"/>
  <text x="150" y="115" text-anchor="middle" font-size="10.5" fill="#666666">contraseña</text>
  <text x="150" y="128" text-anchor="middle" font-size="9.5" fill="#888888">(en /etc/shadow)</text>

  <line x1="219" y1="89" x2="219" y2="100" stroke="#b36b00" stroke-width="1"/>
  <text x="219" y="115" text-anchor="middle" font-size="10.5" fill="#7a4a00">UID</text>

  <line x1="293" y1="89" x2="293" y2="100" stroke="#b36b00" stroke-width="1"/>
  <text x="293" y="115" text-anchor="middle" font-size="10.5" fill="#7a4a00">GID</text>

  <line x1="407" y1="89" x2="407" y2="100" stroke="#888888" stroke-width="1"/>
  <text x="407" y="115" text-anchor="middle" font-size="10.5" fill="#666666">GECOS</text>
  <text x="407" y="128" text-anchor="middle" font-size="9.5" fill="#888888">(comentario)</text>

  <line x1="567" y1="89" x2="567" y2="100" stroke="#2e7d32" stroke-width="1"/>
  <text x="567" y="115" text-anchor="middle" font-size="10.5" fill="#215a26">directorio home</text>

  <line x1="708" y1="89" x2="708" y2="100" stroke="#8b1a1a" stroke-width="1"/>
  <text x="708" y="115" text-anchor="middle" font-size="10.5" fill="#8b1a1a">shell de login</text>

  <text x="400" y="160" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#666666">sysadmin:x:1000:1000:Sysadmin User:/home/sysadmin:/bin/bash</text>
  <text x="400" y="185" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">El campo de contraseña casi siempre muestra "x": el hash real vive en /etc/shadow.</text>
</svg>
