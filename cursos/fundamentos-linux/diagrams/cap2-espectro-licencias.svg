<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Espectro de licencias de software libre y de código abierto</title>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666666"/>
    </marker>
  </defs>
  <rect width="900" height="260" fill="#ffffff"/>
  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Espectro de licencias de Software Libre y de Código Abierto (FOSS)</text>

  <!-- axis -->
  <line x1="65" y1="55" x2="655" y2="55" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow2)" marker-start="url(#arrow2)"/>
  <text x="65" y="45" text-anchor="start" font-size="11" font-style="italic" fill="#666666">Más permisiva</text>
  <text x="655" y="45" text-anchor="end" font-size="11" font-style="italic" fill="#666666">Más copyleft (restrictiva)</text>

  <!-- FOSS spectrum segments -->
  <rect x="60" y="90" width="150" height="55" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="135" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2e7d32">Dominio público</text>
  <text x="135" y="130" text-anchor="middle" font-size="11" fill="#2e7d32">CC0</text>

  <rect x="210" y="90" width="150" height="55" fill="#cfe8d1" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="285" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#215a26">Permisiva</text>
  <text x="285" y="130" text-anchor="middle" font-size="11" fill="#215a26">BSD, MIT, Apache</text>

  <rect x="360" y="90" width="150" height="55" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="435" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a4d8b">Copyleft débil</text>
  <text x="435" y="130" text-anchor="middle" font-size="11" fill="#1a4d8b">LGPLv2 / LGPLv3</text>

  <rect x="510" y="90" width="150" height="55" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="585" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#ffffff">Copyleft fuerte</text>
  <text x="585" y="130" text-anchor="middle" font-size="11" fill="#ffffff">GPLv2 / GPLv3</text>

  <text x="360" y="168" text-anchor="middle" font-size="11" fill="#444444">↑ Todas exigen disponer del código fuente; difieren en si los cambios deben redistribuirse bajo la misma licencia (copyleft)</text>

  <!-- divider -->
  <line x1="682" y1="80" x2="682" y2="230" stroke="#999999" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="370" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#666666"></text>
  <text x="365" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">FOSS (código abierto)</text>

  <!-- closed source box -->
  <rect x="705" y="90" width="150" height="55" fill="#fbeaea" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="780" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8b1a1a">Código cerrado</text>
  <text x="780" y="130" text-anchor="middle" font-size="11" fill="#8b1a1a">EULA (ej. Windows)</text>
  <text x="780" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b1a1a">No es FOSS</text>

  <text x="450" y="240" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">La FSF promueve las licencias copyleft (GPL/LGPL); la OSI acepta también las permisivas (BSD/MIT) como "código abierto".</text>
</svg>
