<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Anatomía de los permisos rwx y su equivalencia octal</title>
  <rect width="700" height="230" fill="#ffffff"/>
  <text x="350" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Anatomía de los permisos: -rwxr-xr--</text>

  <!-- tipo -->
  <rect x="100" y="45" width="50" height="44" rx="4" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="125" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#555555">-</text>

  <!-- owner rwx -->
  <rect x="152" y="45" width="50" height="44" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="177" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">r</text>
  <rect x="204" y="45" width="50" height="44" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="229" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">w</text>
  <rect x="256" y="45" width="50" height="44" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="281" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">x</text>

  <!-- group r-x -->
  <rect x="308" y="45" width="50" height="44" fill="#fff3e0" stroke="#b36b00" stroke-width="1.5"/>
  <text x="333" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">r</text>
  <rect x="360" y="45" width="50" height="44" fill="#fff3e0" stroke="#b36b00" stroke-width="1.5"/>
  <text x="385" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">-</text>
  <rect x="412" y="45" width="50" height="44" fill="#fff3e0" stroke="#b36b00" stroke-width="1.5"/>
  <text x="437" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">x</text>

  <!-- other (r without w or x) -->
  <rect x="464" y="45" width="50" height="44" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="489" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#215a26">r</text>
  <rect x="516" y="45" width="50" height="44" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="541" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#215a26">-</text>
  <rect x="568" y="45" width="50" height="44" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="593" y="74" text-anchor="middle" font-size="15" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#215a26">-</text>

  <!-- tipo label -->
  <text x="125" y="112" text-anchor="middle" font-size="10.5" fill="#666666">tipo</text>
  <text x="125" y="125" text-anchor="middle" font-size="9.5" fill="#888888">(archivo)</text>

  <!-- owner bracket -->
  <line x1="152" y1="100" x2="306" y2="100" stroke="#1a4d8b" stroke-width="1.5"/>
  <line x1="152" y1="100" x2="152" y2="106" stroke="#1a4d8b" stroke-width="1.5"/>
  <line x1="306" y1="100" x2="306" y2="106" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="229" y="117" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1a4d8b">Propietario</text>
  <text x="229" y="132" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">4+2+1 = 7</text>

  <!-- group bracket -->
  <line x1="308" y1="100" x2="462" y2="100" stroke="#b36b00" stroke-width="1.5"/>
  <line x1="308" y1="100" x2="308" y2="106" stroke="#b36b00" stroke-width="1.5"/>
  <line x1="462" y1="100" x2="462" y2="106" stroke="#b36b00" stroke-width="1.5"/>
  <text x="385" y="117" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#7a4a00">Grupo</text>
  <text x="385" y="132" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">4+0+1 = 5</text>

  <!-- other bracket -->
  <line x1="464" y1="100" x2="618" y2="100" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="464" y1="100" x2="464" y2="106" stroke="#2e7d32" stroke-width="1.5"/>
  <line x1="618" y1="100" x2="618" y2="106" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="541" y="117" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#215a26">Otros</text>
  <text x="541" y="132" text-anchor="middle" font-size="11" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#215a26">4+0+0 = 4</text>

  <rect x="255" y="155" width="190" height="34" rx="6" fill="#333333"/>
  <text x="350" y="177" text-anchor="middle" font-size="13" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#ffffff">chmod 754 archivo</text>

  <text x="350" y="210" text-anchor="middle" font-size="11" fill="#666666">r = 4 &#183; w = 2 &#183; x = 1 &#8594; suma los valores presentes en cada tríada</text>
</svg>
