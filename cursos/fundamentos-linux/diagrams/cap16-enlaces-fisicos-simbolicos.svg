<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Enlaces físicos frente a enlaces simbólicos</title>
  <defs>
    <marker id="arrow16b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>
  <rect width="780" height="320" fill="#ffffff"/>
  <text x="390" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333">Enlaces físicos (hard links) frente a enlaces simbólicos (symlinks)</text>

  <text x="200" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d8b">Enlace físico</text>
  <text x="580" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#b36b00">Enlace simbólico</text>

  <line x1="400" y1="50" x2="400" y2="300" stroke="#dddddd" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Panel A: hard links -->
  <rect x="55" y="70" width="110" height="40" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="110" y="95" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#444444">passwd</text>

  <rect x="235" y="70" width="110" height="40" rx="6" fill="#f5f5f5" stroke="#888888" stroke-width="1.5"/>
  <text x="290" y="95" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#444444">mypasswd</text>

  <line x1="110" y1="110" x2="150" y2="170" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow16b)"/>
  <line x1="290" y1="110" x2="250" y2="170" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow16b)"/>

  <rect x="100" y="170" width="200" height="60" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="200" y="196" text-anchor="middle" font-size="13" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace">Inodo #123</text>
  <text x="200" y="213" text-anchor="middle" font-size="11" fill="#dbe7f6">(datos del archivo)</text>

  <text x="200" y="255" text-anchor="middle" font-size="11" fill="#444444">Ambos nombres son enlaces físicos</text>
  <text x="200" y="270" text-anchor="middle" font-size="11" fill="#444444">al mismo inodo (cuenta de enlaces = 2)</text>
  <text x="200" y="290" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">Si borras "passwd", "mypasswd" sigue accediendo a los datos.</text>

  <!-- Panel B: symlinks -->
  <rect x="485" y="70" width="150" height="40" rx="6" fill="#fff3e0" stroke="#b36b00" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="560" y="95" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#7a4a00">mypasswd.link</text>

  <line x1="560" y1="110" x2="560" y2="140" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow16b)"/>

  <rect x="485" y="140" width="150" height="40" rx="6" fill="#eaf1fb" stroke="#1a4d8b" stroke-width="1.5"/>
  <text x="560" y="164" text-anchor="middle" font-size="11.5" font-family="SFMono-Regular, Menlo, Consolas, monospace" fill="#1a4d8b">/etc/passwd</text>

  <line x1="560" y1="180" x2="560" y2="208" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrow16b)"/>

  <rect x="470" y="208" width="180" height="55" rx="8" fill="#1a4d8b" stroke="#123a68" stroke-width="1.5"/>
  <text x="560" y="230" text-anchor="middle" font-size="13" fill="#ffffff" font-family="SFMono-Regular, Menlo, Consolas, monospace">Inodo #123</text>
  <text x="560" y="247" text-anchor="middle" font-size="11" fill="#dbe7f6">(datos del archivo)</text>

  <text x="560" y="280" text-anchor="middle" font-size="11" fill="#444444">El symlink apunta a una RUTA, no al inodo</text>
  <text x="560" y="298" text-anchor="middle" font-size="10.5" font-style="italic" fill="#666666">Si borras "/etc/passwd", "mypasswd.link" queda roto.</text>
</svg>
